<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
   <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;        
            min-height: 100vh;
            padding: 20px;
        }

        .modal-container {
            display: flex;
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

       
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px; 
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            z-index: 10;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Left Side - Image Section */
        .left-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .left-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Image Placeholder */
        .image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8b2fc9 0%, #6b1fa8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            text-align: center;
            padding: 40px;
        }

        /* Right Side - Login Form */
        .right-section {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 16px;
        }

        /* Form */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .phone-input-group {
            display: flex;
            gap: 10px;
        }

        .country-select {
            width: 100px;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .country-flag {
            font-size: 24px;
        }

        .phone-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .phone-input:focus {
            outline: none;
            border-color: #2d5f4f;
        }

        .phone-input::placeholder {
            color: #ccc;
        }

        .request-otp-btn {
            width: 100%;
            padding: 16px;
            background-color: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 25px;
        }

        .request-otp-btn:hover {
            background-color: #2d5f4f;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
        }

        /* Alternative Login Buttons */
        .alt-login-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .alt-login-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #333;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .alt-login-btn:hover {
            border-color: #2d5f4f;
            background-color: #f5f5f5;
        }

        .alt-login-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Terms */
        .terms {
            text-align: center;
            font-size: 13px;
            color: #999;
            line-height: 1.6;
        }

        .terms a {
            color: #2d5f4f;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .modal-container {
                flex-direction: column;
            }

            .left-section {
                padding: 40px 30px;
            }

            .right-section {
                padding: 40px 30px;
            }

            .close-btn {
                background: rgba(0, 0, 0, 0.5);
            }
        }

        @media (max-width: 480px) {
            .alt-login-buttons {
                flex-direction: column;
            }

            .login-header h1 {
                font-size: 26px;
            }

            .welcome-text h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="modal-container">
        <!-- Close Button -->
        <a href="index.html" class="close-btn">✕</a>

        <!-- Left Section - Image -->
        <div class="left-section">
           
           <img src="https://cdn.shopify.com/s/files/1/0953/1848/files/Group_1171276892.png?v=1725365653">
        </div>

        <!-- Right Section - Login Form -->
        <div class="right-section">
            <div class="login-header">
                <h1>Login with OTP</h1>
                <p>Enter your log in details</p>
            </div>

            <form action="#" method="POST">
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <div class="phone-input-group">
                        <div class="country-select">
                            <span class="country-flag">🇮🇳</span>
                            <span>▼</span>
                        </div>
                        <input 
                            type="tel" 
                            class="phone-input" 
                            placeholder="Phone number"
                            maxlength="10"
                            pattern="[0-9]{10}"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="request-otp-btn">Request OTP</button>
            </form>

            <div class="divider">
                <span>Or Login Using</span>
            </div>

            <div class="alt-login-buttons">
                <a href="#whatsapp-login" class="alt-login-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" fill="#25D366"/>
                    </svg>
                    WhatsApp
                </a>

                <a href="#email-login" class="alt-login-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="#333"/>
                    </svg>
                    Email
                </a>
            </div>

            <div class="terms">
                I accept that I have read & understood<br>
                <a href="#">Privacy Policy</a> and <a href="#">T&Cs</a>.
            </div>
        </div>
    </div>





</body>
</html>
